<div class="mat-elevation-z8">
  <table mat-table class="full-width-table" matSort aria-label="Elements">

    <!-- Id Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>Id</th>
      <td class="select-box" mat-cell *matCellDef="let row" (click)="selectBox(row.id)">{{row.id}}</td>
    </ng-container>

    <!-- Box Id Column -->
    <ng-container matColumnDef="box_id">
      <th mat-header-cell *matHeaderCellDef>Box Id</th>
      <td mat-cell *matCellDef="let row">{{row.box_id}}</td>
    </ng-container>

    <!-- Sensor Type Column -->
    <ng-container matColumnDef="sensor_type">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Sensor Type</th>
      <td mat-cell *matCellDef="let row">{{row.sensor_type}}</td>
    </ng-container>

    <!-- Data Type Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Data Type</th>
      <td mat-cell *matCellDef="let row">{{row.name}}</td>
    </ng-container>

    <!-- Range - Lower Bound Column -->
    <ng-container matColumnDef="range_l">
      <th mat-header-cell *matHeaderCellDef>Range - Lower Bound</th>
      <td mat-cell *matCellDef="let row">{{row.range_l}}</td>
    </ng-container>

    <!-- Range - Upper Bound Column -->
    <ng-container matColumnDef="range_u">
      <th mat-header-cell *matHeaderCellDef>Range - Upper Bound</th>
      <td mat-cell *matCellDef="let row">{{row.range_u}}</td>
    </ng-container>

    <!-- Location (long) Column -->
    <ng-container matColumnDef="longitude">
      <th mat-header-cell *matHeaderCellDef>Location (long)</th>
      <td mat-cell *matCellDef="let row">{{row.longitude}}</td>
    </ng-container>

    <!-- Location (lat) Column -->
    <ng-container matColumnDef="latitude">
      <th mat-header-cell *matHeaderCellDef>Location (lat)</th>
      <td mat-cell *matCellDef="let row">{{row.latitude}}</td>
    </ng-container>

    <!-- Reading Column -->
    <ng-container matColumnDef="reading">
      <th mat-header-cell *matHeaderCellDef>Reading</th>
      <td mat-cell *matCellDef="let row">{{row.reading}}</td>
    </ng-container>

    <!-- Unit Column -->
    <ng-container matColumnDef="unit">
      <th mat-header-cell *matHeaderCellDef>Unit</th>
      <td mat-cell *matCellDef="let row">{{row.unit}}</td>
    </ng-container>

    <!-- Time Column -->
    <ng-container matColumnDef="reading_ts">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Time</th>
      <td mat-cell *matCellDef="let row">{{row.reading_ts}}</td>
    </ng-container>



    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator #paginator
      [length]="dataSource?.data.length"
      [pageIndex]="0"
      [pageSize]="25"
      [pageSizeOptions]="[25, 50, 100, 250]">
  </mat-paginator>
</div>
